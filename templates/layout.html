<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Pizzería</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="fixed top-4 right-4 z-50">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div id="alert-{{ loop.index }}" class="flex items-center p-4 mb-4 text-sm rounded-lg {% if category == 'success' %}text-green-800 bg-green-50{% else %}text-blue-800 bg-blue-50{% endif %}" role="alert">
                <span class="font-medium">{{ message }}</span>
                <button type="button" class="ml-auto bg-transparent text-gray-500 rounded-lg focus:ring-2 p-1.5 inline-flex h-8 w-8" data-dismiss-target="#alert-{{ loop.index }}" aria-label="Close">
                  <span class="sr-only">Cerrar</span>
                  <svg class="w-3 h-3" fill="none" viewBox="0 0 14 14"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/></svg>
                </button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>

    <main class="container mx-auto mt-10 p-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
